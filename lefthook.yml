pre-commit:
  parallel: true
  commands:
    format:
      glob: "**/*.py"
      run: uv run ruff format {staged_files}
    lint:
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files}
    restage:
      run: git add {staged_files}

commit-msg:
  commands:
    semantic-commit:
      run: uv run cz check --allow-abort --commit-msg-file {1}
